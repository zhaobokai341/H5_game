<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maze Explorer - Live Map</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container">
        <div id="minimap-container" onclick="toggleMap()">
            <div id="minimap"></div>
            <div id="nav-hint"></div>
            <small id="map-label">VIEW MAP</small>
        </div>

        <div class="header">
            <input type="number" id="sizeInput" value="21" min="11" max="51">
            <button onclick="initGame()">New Game</button>
        </div>

        <div class="stats">Time: <span id="timer">0</span>s</div>
        
        <div id="maze-viewport"></div>

        <div class="dpad">
            <button class="dbtn up" onmousedown="handleMove(0, -1)" ontouchstart="handleMove(0, -1)">▲</button>
            <div class="dpad-mid">
                <button class="dbtn left" onmousedown="handleMove(-1, 0)" ontouchstart="handleMove(-1, 0)">◀</button>
                <button class="dbtn right" onmousedown="handleMove(1, 0)" ontouchstart="handleMove(1, 0)">▶</button>
            </div>
            <button class="dbtn down" onmousedown="handleMove(0, 1)" ontouchstart="handleMove(0, 1)">▼</button>
        </div>
        
        <p id="status">Find the Exit!</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
